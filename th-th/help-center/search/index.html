<!doctype html>
<html lang="th-th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Help Center</title>
    <link rel="stylesheet" href="../../../assets/help-center.css" />
  </head>
  <body data-page="search" data-lang="th-th" data-prefix="../../../">
    
    <header class="siteHeader">
      <div class="siteHeader__inner">
        <a class="brand" href="../../../th-th/help-center/">
          <img src="../../../assets/logos/logo-dark.png" alt="Spec Markets Help Center" />
        </a>
        <nav class="siteNav" aria-label="Help Center navigation">
          <a href="../../../th-th/help-center/">Home</a>
          <a href="../../../th-th/help-center/search/">Search</a>
          <span class="siteBadge">Static Preview</span>
        </nav>
      </div>
    </header>
  
    
      <main class="helpCenter">
        <section class="hero searchHero heroImage">
          <div class="container">
            <div class="searchHeroContent">
              <nav class="breadcrumbs" aria-label="Breadcrumb">
                <a href="../../../th-th/help-center/">Help Center</a>
                <span>/</span>
                <span>Search</span>
              </nav>
              <div>
                <h1 class="title" data-search-heading>Search the Help Center</h1>
              </div>
              <div class="searchPanel searchHeroPanel">
                
    <form class="searchBox" data-search-form action="../../../th-th/help-center/search/" role="search">
      <input class="searchInput" name="q" value="" placeholder="Type your question here" aria-label="Type your question here" autocomplete="off" />
      <button class="searchButton" type="submit" aria-label="Search">
        
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="11" cy="11" r="7.25" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></circle>
      <path d="m16.15 16.15 4.35 4.35" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    </svg>
  
        <span class="srOnly">Search</span>
      </button>
    </form>
  
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="searchResults" data-search-results></div>
            <div data-empty-categories hidden></div>
          </div>
        </section>
      </main>
    
    
    <footer class="siteFooter">
      <div class="helpContainer">
        <div class="siteFooter__inner">
          <div class="siteFooter__copy">
            <a class="brand" href="../../../th-th/help-center/">
              <img src="../../../assets/logos/logo-dark.png" alt="Spec Markets Help Center" />
            </a>
            <p>This standalone site is generated from the current Help Center data in specmarkets and published separately for stakeholder review.</p>
          </div>
          <div class="siteFooter__links">
            <a href="../../../th-th/help-center/">Help Center Home</a>
            <a href="../../../th-th/help-center/search/">Search Articles</a>
          </div>
        </div>
      </div>
    </footer>
  
    <script src="../../../assets/help-center.js" defer></script>
  </body>
</html>
