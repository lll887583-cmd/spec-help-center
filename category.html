<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category - Spec Help Center Demo</title>
    <link rel="stylesheet" href="./css/pages.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <script src="./js/data.js" defer></script>
    <script src="./js/i18n.js" defer></script>
    <script src="./js/components.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body data-page="category">
    <div data-site-header></div>

    <main class="page-shell">
      <div class="help-container">
        <div data-breadcrumb></div>
        <div class="category-page-grid">
          <aside class="category-sidebar" aria-label="Category filters" data-category-sidebar></aside>
          <section>
            <div data-category-heading></div>
            <div class="article-list" data-category-list></div>
          </section>
        </div>
      </div>
    </main>

    <section class="help-section help-section--tinted">
      <div class="help-container" data-contact-card></div>
    </section>

    <div data-site-footer></div>
  </body>
</html>
